name: Test Notify API

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'version 字段 (例如 v1.7)'
        required: false
        default: 'v1.7'
      log:
        description: 'log 字段'
        required: false
        default: 'test notify from CI'
      send_bad_sign:
        description: '故意发错的 sign（true=不污染 data.json，期望 PHP 返回 401；false=发真实 sign，会更新 data.json）'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: POST do.cloud-pe.cn (diagnostic)
        shell: pwsh
        env:
          API_SECRET:     ${{ secrets.API_UPDATE_SECRET }}
          INPUT_VERSION:  ${{ inputs.version }}
          INPUT_LOG:      ${{ inputs.log }}
          INPUT_BAD_SIGN: ${{ inputs.send_bad_sign }}
        run: |
          $ErrorActionPreference = 'Continue'

          $outFile = '.github/test-notify-result.md'
          if (Test-Path $outFile) { Remove-Item $outFile -Force }

          function Log {
            param([string]$msg)
            Write-Host $msg
            $msg | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
            $msg | Out-File -FilePath $outFile -Append -Encoding utf8
          }

          if ([string]::IsNullOrEmpty($env:API_SECRET)) {
            Log '**ERROR**: API_UPDATE_SECRET secret not configured'
            exit 1
          }

          $md5       = '00000000000000000000000000000000'
          $version   = if ($env:INPUT_VERSION) { $env:INPUT_VERSION } else { 'v1.7' }
          $log       = if ($env:INPUT_LOG)     { $env:INPUT_LOG     } else { 'test' }
          $can_skip  = 'true'
          $timestamp = [int64]([DateTimeOffset]::UtcNow.ToUnixTimeSeconds())
          $rand      = [guid]::NewGuid().ToString('N').Substring(0,16)

          $payload = "$timestamp$rand$version$md5$log$can_skip"
          $hmac = [System.Security.Cryptography.HMACSHA256]::new([System.Text.Encoding]::UTF8.GetBytes($env:API_SECRET))
          try {
            $hash = $hmac.ComputeHash([System.Text.Encoding]::UTF8.GetBytes($payload))
          } finally {
            $hmac.Dispose()
          }
          $realSign = -join ($hash | ForEach-Object { $_.ToString('x2') })

          if ($env:INPUT_BAD_SIGN -eq 'true') {
            $sign = '0' * 64
            Log '## Mode: BAD SIGN (期望 PHP 返回 401 Sign mismatch — 这代表请求到达了 PHP)'
          } else {
            $sign = $realSign
            Log '## Mode: REAL SIGN (data.json 会被更新)'
          }

          Log ''
          Log '## Request'
          Log "- URL: https://do.cloud-pe.cn"
          Log "- version=$version"
          Log "- md5=$md5"
          Log "- timestamp=$timestamp"
          Log "- rand=$rand"
          Log "- sign=$sign"
          Log "- log=$log"
          Log "- can_skip=$can_skip"

          $bodyObj = [ordered]@{
            timestamp = $timestamp
            rand      = $rand
            sign      = $sign
            version   = $version
            md5       = $md5
            log       = $log
            can_skip  = $can_skip
          }
          $bodyJson  = $bodyObj | ConvertTo-Json -Compress
          $bodyBytes = [System.Text.Encoding]::UTF8.GetBytes($bodyJson)
          Log ''
          Log '## Request body'
          Log '```json'
          Log $bodyJson
          Log '```'
          Log "- bytes: $($bodyBytes.Length)"

          try {
            $resp = Invoke-WebRequest -Uri 'https://do.cloud-pe.cn' -Method Post `
              -Body $bodyBytes -ContentType 'application/json; charset=utf-8' `
              -UserAgent 'Cloud-PE-One-Release-Test/1.0' `
              -SkipHttpErrorCheck
          } catch {
            Log ''
            Log '## Transport ERROR (没收到 HTTP 响应)'
            Log $_.Exception.Message
            exit 1
          }

          Log ''
          Log "## Response: HTTP $($resp.StatusCode) $($resp.StatusDescription)"
          Log ''
          Log '### Headers'
          $resp.Headers.GetEnumerator() | ForEach-Object { Log "- $($_.Key): $($_.Value -join ', ')" }

          Log ''
          Log "### Body (length=$($resp.Content.Length))"
          Log '```'
          Log $resp.Content
          Log '```'

          Log ''
          if ($env:INPUT_BAD_SIGN -eq 'true') {
            if ($resp.StatusCode -eq 401 -and $resp.Content -like '*Sign mismatch*') {
              Log '**结论**: 请求成功到达 PHP，链路 OK。把 send_bad_sign 关掉再试一次就是真发布。'
            } else {
              Log '**结论**: 请求没走到 PHP（PHP 收到错 sign 应该返回 401 + Sign mismatch）。响应来自上游某一层（看上面 Server/headers 推断 nginx/openresty/Cloudflare/1Panel-WAF）。'
            }
          } else {
            if ($resp.StatusCode -eq 200 -and $resp.Content -like '*"code":200*') {
              Log '**结论**: 真实链路 OK，data.json 已更新。'
            } else {
              Log '**结论**: 真实请求被拒，看响应头判断哪一层拦的。'
            }
          }

      - name: Commit diagnostic result back to repo
        if: always()
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/test-notify-result.md
          if git diff --cached --quiet; then
            echo "no change in result file"
          else
            git commit -m "ci: test-notify diagnostic result $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            for i in 1 2 3 4; do
              if git push origin "HEAD:${GITHUB_REF_NAME}"; then break; fi
              sleep $((2 ** i))
            done
          fi
