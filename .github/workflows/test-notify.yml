name: Test Notify API

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'version 字段 (例如 v1.7)'
        required: false
        default: 'v1.7'
      log:
        description: 'log 字段'
        required: false
        default: 'test notify from CI'
      send_bad_sign:
        description: '故意发错的 sign（true=不污染 data.json，期望 PHP 返回 401；false=发真实 sign，会真写 data.json）'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: POST do.cloud-pe.cn (diagnostic)
        shell: pwsh
        env:
          API_SECRET:     ${{ secrets.API_UPDATE_SECRET }}
          INPUT_VERSION:  ${{ inputs.version }}
          INPUT_LOG:      ${{ inputs.log }}
          INPUT_BAD_SIGN: ${{ inputs.send_bad_sign }}
        run: |
          $ErrorActionPreference = 'Continue'

          $outFile = '.github/test-notify-result.md'
          if (Test-Path $outFile) { Remove-Item $outFile -Force }

          function Log {
            param([string]$msg)
            Write-Host $msg
            $msg | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
            $msg | Out-File -FilePath $outFile -Append -Encoding utf8
          }

          if ([string]::IsNullOrEmpty($env:API_SECRET)) {
            Log '**ERROR**: API_UPDATE_SECRET secret not configured'
            exit 1
          }

          $md5       = '00000000000000000000000000000000'
          $version   = if ($env:INPUT_VERSION) { $env:INPUT_VERSION } else { 'v1.7' }
          $log       = if ($env:INPUT_LOG)     { $env:INPUT_LOG     } else { 'test' }
          $can_skip  = 'true'
          $timestamp = [int64]([DateTimeOffset]::UtcNow.ToUnixTimeSeconds())
          $rand      = [guid]::NewGuid().ToString('N').Substring(0,16)

          $payload = "$timestamp$rand$version$md5$log$can_skip"
          $payloadBytes = [System.Text.Encoding]::UTF8.GetBytes($payload)
          $secretBytes  = [System.Text.Encoding]::UTF8.GetBytes($env:API_SECRET)
          $hmac = [System.Security.Cryptography.HMACSHA256]::new($secretBytes)
          try {
            $hash = $hmac.ComputeHash($payloadBytes)
          } finally {
            $hmac.Dispose()
          }
          $realSign = -join ($hash | ForEach-Object { $_.ToString('x2') })

          if ($env:INPUT_BAD_SIGN -eq 'true') {
            $sign = '0' * 64
            Log '## Mode: BAD SIGN (期望 PHP 返回 401 Sign mismatch)'
          } else {
            $sign = $realSign
            Log '## Mode: REAL SIGN (期望 PHP 返回 200，data.json 会被改)'
          }

          $logBytes = [System.Text.Encoding]::UTF8.GetBytes($log)
          Log ''
          Log '## Inputs'
          Log "- secret_length_chars: $($env:API_SECRET.Length)  bytes: $($secretBytes.Length)"
          Log "- version=$version"
          Log "- md5=$md5"
          Log "- timestamp=$timestamp"
          Log "- rand=$rand"
          Log "- log='$log'  (length=$($log.Length) chars, $($logBytes.Length) bytes)"
          Log "- can_skip=$can_skip"
          Log "- payload bytes: $($payloadBytes.Length)"
          Log "- real_sign: $realSign"
          Log "- sign sent: $sign"

          $bodyObj = [ordered]@{
            timestamp = $timestamp
            rand      = $rand
            sign      = $sign
            version   = $version
            md5       = $md5
            log       = $log
            can_skip  = $can_skip
          }
          $bodyJson  = $bodyObj | ConvertTo-Json -Compress
          $bodyBytes = [System.Text.Encoding]::UTF8.GetBytes($bodyJson)
          Log ''
          Log '## Request body'
          Log '```json'
          Log $bodyJson
          Log '```'
          Log "- bytes: $($bodyBytes.Length)"

          try {
            $resp = Invoke-WebRequest -Uri 'https://do.cloud-pe.cn' -Method Post `
              -Body $bodyBytes -ContentType 'application/json; charset=utf-8' `
              -UserAgent 'Cloud-PE-One-Release-Test/1.0' `
              -SkipHttpErrorCheck
          } catch {
            Log ''
            Log '## Transport ERROR'
            Log $_.Exception.Message
            exit 1
          }

          Log ''
          Log "## Response: HTTP $($resp.StatusCode) $($resp.StatusDescription)"
          Log ''
          Log '### Headers'
          $resp.Headers.GetEnumerator() | ForEach-Object { Log "- $($_.Key): $($_.Value -join ', ')" }
          Log ''
          Log "### Body (length=$($resp.Content.Length))"
          Log '```'
          Log $resp.Content
          Log '```'

          Log ''
          if ($env:INPUT_BAD_SIGN -eq 'true') {
            if ($resp.StatusCode -eq 401 -and $resp.Content -like '*Sign mismatch*') {
              Log '**结论**: 链路 OK，PHP 收到了请求并按预期返回 401 Sign mismatch'
            } else {
              Log '**结论**: 请求没走到 PHP — 看上面响应来自哪一层'
            }
          } else {
            if ($resp.StatusCode -eq 200 -and $resp.Content -like '*"code":200*') {
              Log '**结论**: 真实链路通了，data.json 已更新'
            } elseif ($resp.StatusCode -eq 401 -and $resp.Content -like '*Sign mismatch*') {
              Log '**结论**: 链路通但 PHP 验签失败 — GitHub secret 跟 PHP SECRET 对不上 / log 编码或字节有差'
            } else {
              Log '**结论**: 真实请求被拒，看响应判断'
            }
          }

      - name: Commit diagnostic result back to repo
        if: always()
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/test-notify-result.md
          if git diff --cached --quiet; then
            echo "no change in result file"
          else
            git commit -m "ci: test-notify diagnostic $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            for i in 1 2 3 4; do
              if git push origin "HEAD:${GITHUB_REF_NAME}"; then break; fi
              sleep $((2 ** i))
            done
          fi
